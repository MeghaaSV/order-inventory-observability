apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory
  template:
    metadata:
      labels:
        app: inventory
    spec:
      containers:
        - name: inventory
          image: YOUR_REGISTRY/inventory:latest
          ports:
            - containerPort: 8001
            - containerPort: 9464
---
apiVersion: v1
kind: Service
metadata:
  name: inventory
spec:
  selector:
    app: inventory
  ports:
    - name: http
      port: 8001
      targetPort: 8001
    - name: metrics
      port: 9464
      targetPort: 9464
  type: ClusterIP